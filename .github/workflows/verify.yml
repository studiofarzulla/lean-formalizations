name: Verify Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Governance checks only (PaperMap refs, claims matrix, consistency).
      # The Lean build runs in lean_action_ci.yml via leanprover/lean-action,
      # which restores the Mathlib cache; building Mathlib from source here
      # would exceed the runner time limit.
      - name: Run governance checks
        run: make verify-fast

      - name: Upload verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paper-verification-report
          path: reports/paper_verification_report.md
          if-no-files-found: warn
