name: Verify Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install elan
        run: |
          curl https://elan.lean-lang.org/install.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Run full verify pipeline
        run: make verify

      - name: Upload verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paper-verification-report
          path: reports/paper_verification_report.md
          if-no-files-found: warn
